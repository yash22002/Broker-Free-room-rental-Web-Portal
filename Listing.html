<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>List Property | Broker-Free Rental Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f2f3f7; font-family: 'Segoe UI', sans-serif; }
        .form-section { background: #ffffff; border-radius: 12px; padding: 40px 30px; box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .btn-submit { background: #1c7ed6; color: #fff; font-weight: 500; }
        .page-title { font-weight: 700; color: #343a40; }
        .preview img, .preview video { max-width: 100px; max-height: 80px; margin: 5px; border-radius: 5px; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="main.html">RentalPortal</a>
        <div class="ms-auto">
            <a class="nav-link d-inline me-3 fw-semibold" href="Owner.php">Dashboard</a>
            <a class="btn btn-outline-danger btn-sm" href="Account.html">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="form-section">
                <h2 class="page-title text-center mb-4">List Your Property</h2>
                
                <form id="listPropertyForm" action="insert_property.php" method="POST" enctype="multipart/form-data">
                    
                    <div class="mb-3">
                        <label>City</label>
                        <input type="text" class="form-control" name="city" placeholder="Enter city" required>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label>Property Type</label>
                            <select class="form-select" name="propertyType" required>
                                <option value="PG">PG</option>
                                <option value="Flat">Flat</option>
                                <option value="Shared Room">Shared Room</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label>Suitable For</label>
                            <select class="form-select" name="userType" required>
                                <option value="Student">Student</option>
                                <option value="Employee">Employee</option>
                                <option value="Others">Others</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label>Furnished</label>
                            <select class="form-select" name="furnished" required>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label>Rent (₹)</label>
                            <div class="d-flex gap-2">
                                <input type="number" class="form-control" name="rentMin" placeholder="Min" required>
                                <input type="number" class="form-control" name="rentMax" placeholder="Max" required>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label>Description</label>
                        <textarea class="form-control" name="description" rows="3" placeholder="Describe your property..." required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold d-block mb-2">Amenities</label>
                        <div class="d-flex flex-wrap gap-3">
                            <label><input type="checkbox" name="amenities[]" value="WiFi"> WiFi</label>
                            <label><input type="checkbox" name="amenities[]" value="AC"> AC</label>
                            <label><input type="checkbox" name="amenities[]" value="Parking"> Parking</label>
                            <label><input type="checkbox" name="amenities[]" value="Attached Bathroom"> Bathroom</label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Media Count (1-5)</label>
                        <select class="form-select mb-2" id="mediaCount">
                            <option value="1">1 File</option>
                            <option value="2">2 Files</option>
                            <option value="3">3 Files</option>
                            <option value="4">4 Files</option>
                            <option value="5">5 Files</option>
                        </select>
                        
                        <div id="mediaFields">
                            <input type="file" name="media1" class="form-control mb-2" accept="image/*,video/*" required>
                            <input type="file" name="media2" class="form-control mb-2 d-none" accept="image/*,video/*">
                            <input type="file" name="media3" class="form-control mb-2 d-none" accept="image/*,video/*">
                            <input type="file" name="media4" class="form-control mb-2 d-none" accept="image/*,video/*">
                            <input type="file" name="media5" class="form-control mb-2 d-none" accept="image/*,video/*">
                        </div>
                        <div class="preview d-flex flex-wrap" id="mediaPreview"></div>
                    </div>

                    <button type="submit" class="btn btn-submit w-100 btn-lg">Post Property</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const mediaCount = document.getElementById('mediaCount');
    const mediaFields = document.getElementById('mediaFields');
    const mediaPreview = document.getElementById('mediaPreview');

    mediaCount.addEventListener('change', () => {
        const count = parseInt(mediaCount.value);
        const inputs = mediaFields.querySelectorAll('input');
        inputs.forEach((input, index) => {
            if (index < count) {
                input.classList.remove('d-none');
            } else {
                input.classList.add('d-none');
                input.value = ''; 
            }
        });
    });

    // Simple Preview Logic
    mediaFields.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = document.createElement('img');
                img.src = event.target.result;
                mediaPreview.appendChild(img);
            };
            reader.readAsDataURL(e.target.files[0]);
        }
    });
</script>
</body>
</html>
