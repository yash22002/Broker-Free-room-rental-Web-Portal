<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login & Signup | Tenant & Owner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            background: linear-gradient(135deg,#fff1cc,#cce7ff);
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .card{
            border-radius:18px;
            box-shadow:0 15px 35px rgba(0,0,0,0.3);
        }
        .nav-pills .nav-link.active{
            background:#c33764;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center align-items-center">

        <div class="col-md-5 d-none d-md-block">
            <div id="rentalCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">
                <div class="carousel-inner rounded-4 shadow">
                    <div class="carousel-item active">
                        <img src="https://images.unsplash.com/photo-1560185127-6ed189bf02f4" class="d-block w-100" alt="Home 1">
                    </div>
                    <div class="carousel-item">
                        <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267" class="d-block w-100" alt="Home 2">
                    </div>
                    <div class="carousel-item">
                        <img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688" class="d-block w-100" alt="Home 3">
                    </div>
                    <div class="carousel-item">
                        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c" class="d-block w-100" alt="Home 4">
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center mb-3">Rental Portal</h3>
                <p class="text-center text-muted">Tenant & Owner Login / Signup</p>

                <ul class="nav nav-pills nav-justified mb-3">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#login">Login</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#signup">Signup</button>
                    </li>
                </ul>

                <div class="tab-content">

                    <div class="tab-pane fade show active" id="login">
                        <form action="login.php" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Login As</label>
                                <select class="form-select" name="role" required>
                                    <option value="Tenant">Tenant</option>
                                    <option value="Owner">Owner</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                            </div>
                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="signup">
                        <form action="signup.php" method="POST">
                            <div class="mb-3">
                                <label>Register As</label>
                                <select class="form-select" name="role" required>
                                    <option value="Tenant">Tenant</option>
                                    <option value="Owner">Owner</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>Full Name</label>
                                <input type="text" name="full_name" class="form-control" placeholder="Your name" required>
                            </div>
                            <div class="mb-3">
                                <label>Mobile Number</label>
                                <input type="text" name="mobile" class="form-control" placeholder="Mobile number" required>
                            </div>
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" name="email" class="form-control" placeholder="Your email" required>
                            </div>
                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" name="password" class="form-control" placeholder="Create password" required>
                            </div>
                            <div class="mb-3">
                                <label>Confirm Password</label>
                                <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Create Account</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
